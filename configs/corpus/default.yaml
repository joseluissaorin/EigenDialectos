mode: mixed
samples_per_dialect: 5000
sources:
  - synthetic
  - wikipedia
  - opensubtitles
seed: 42
preprocessing:
  normalize_unicode: true
  remove_urls: true
  remove_mentions: true
  min_length: 10
  max_length: 500
  deduplicate: true
  quality_filter: true
segmentation:
  method: sentence
  max_segment_length: 256
